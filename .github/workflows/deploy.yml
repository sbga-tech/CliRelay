name: Deploy CliRelay

on:
  push:
    branches: [dev]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Reject vendored panel assets
        run: ./scripts/ensure-no-vendored-panel-assets.sh

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'

      - name: Build linux/amd64 binary
        env:
          BUILD_TIME: ${{ github.event.head_commit.timestamp }}
        run: |
          # Use commit timestamp if available, otherwise current time
          if [ -n "$BUILD_TIME" ]; then
            # Normalise to UTC ISO8601 when possible (runner uses GNU date)
            BUILD_DATE="$(date -u -d "$BUILD_TIME" +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || echo "$BUILD_TIME")"
          else
            BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          fi
          SHORT_SHA="$(git rev-parse --short HEAD)"
          VERSION="${{ github.ref_name }}-${SHORT_SHA}"
          echo "Build date: $BUILD_DATE"
          echo "Version: $VERSION"
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -ldflags="-s -w \
              -X 'github.com/router-for-me/CLIProxyAPI/v6/internal/buildinfo.Version=${VERSION}' \
              -X 'github.com/router-for-me/CLIProxyAPI/v6/internal/buildinfo.Commit=${{ github.sha }}' \
              -X 'github.com/router-for-me/CLIProxyAPI/v6/internal/buildinfo.BuildDate=${BUILD_DATE}'" \
            -o cli-proxy-api-new ./cmd/server/

      - name: Upload binary and deploy script
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "cli-proxy-api-new,scripts/deploy-blue-green.sh"
          target: "/opt/clirelay2/"
          overwrite: true

      - name: Blue-green deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            COMMIT_SHA="${{ github.sha }}" bash /opt/clirelay2/scripts/deploy-blue-green.sh
