name: pr-test-build

on:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: cliproxy
          POSTGRES_PASSWORD: cliproxy
          POSTGRES_DB: cliproxy
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cliproxy -d cliproxy"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      CLIRELAY_POSTGRES_TEST_DSN: postgres://cliproxy:cliproxy@localhost:5432/cliproxy?sslmode=disable
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          cache: true
      - name: PR checks
        run: ./scripts/ci-pr.sh
